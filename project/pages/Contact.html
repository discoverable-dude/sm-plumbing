<!doctype html>
<html lang="en">
<head>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function ContactHero() {
  return (
    <section className="page-hero" style={{ paddingBottom: 60 }}>
      <div className="page-hero-grad"/>
      <div className="page-hero-inner">
        <div className="eyebrow">
          <span className="eyebrow-dot"/> Direct Access · Free On-Site Survey
        </div>
        <h1>
          Get a Free,<br/>
          <em>No-Obligation Quote.</em>
        </h1>
        <p className="lede">
          Call us directly, or send the details of your project below. We respond
          to every enquiry within 24 working hours.
        </p>
      </div>
    </section>
  );
}

function ContactMap() {
  return (
    <section className="map-block">
      <div className="map-card">
        <div className="map-card-img" style={{ backgroundImage: "url(../assets/contact-workspace.png)" }}/>
        <div className="map-card-grad"/>
        <div className="map-card-pin">
          <div className="map-pin-dot"/>
          <div style={{ fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", fontWeight: 700, color: "var(--brand-2)", background: "var(--brand)", padding: "6px 12px", borderRadius: 999 }}>
            Stanford-le-Hope · Workshop
          </div>
        </div>
        <div className="map-card-content">
          <div>
            <div className="map-card-h">SM Plumbing &amp; Property Services</div>
            <div className="map-card-sub">Stanford-le-Hope, Essex · Serving SS, RM, CM &amp; surrounding</div>
          </div>
          <a href="tel:" className="btn btn-primary btn-sm"><Icon.phone size={14}/> 07XXX XXXXXX</a>
        </div>
      </div>
    </section>
  );
}

function ContactApp() {
  return (
    <PageShell current="contact" screenLabel="05 Contact">
      {({ openQuote }) => (
        <>
          <ContactHero/>
          <ContactSection openQuote={openQuote}/>
          <ContactMap/>
        </>
      )}
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ContactApp/>);
</script>
</body>
</html>
